<header class="app-header">
  <div class="container">

    <div class="navbar-custom">

      <!-- Logo -->
      <a class="logo" routerLink="/">
        <img src="../../assets/logo.png" alt="Logo">
      </a>

      <!-- Desktop Menu -->
      <nav class="desktop-menu">
        <a routerLink="/">Home</a>
        <a routerLink="/policy">Policy</a>
        <a routerLink="/register">Register</a>
        <a routerLink="/contact">Contact</a>
      </nav>

      <!-- Mobile Hamburger -->
      <button
        class="menu-btn"
        (click)="isMenuOpen = !isMenuOpen"
        aria-label="Toggle navigation">
        <i class="fa" [class.fa-times]="isMenuOpen" [class.fa-bars]="!isMenuOpen"></i>
      </button>

    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" [class.show]="isMenuOpen">
      <a routerLink="/" (click)="isMenuOpen=false">Home</a>
      <a routerLink="/policy" (click)="isMenuOpen=false">Policy</a>
      <a routerLink="/register" (click)="isMenuOpen=false">Register</a>
      <a routerLink="/contact" (click)="isMenuOpen=false">Contact</a>
    </div>

  </div>
</header>
