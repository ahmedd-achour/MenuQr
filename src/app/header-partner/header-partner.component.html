<header class="partner-header">

  <div class="container">

    <div class="navbar-wrapper">

      <!-- Logo -->
      <a class="logo" [routerLink]="['/admin-panel', userId]">
        <img src="../../assets/logo.png" alt="Logo">
      </a>

      <!-- Desktop Navigation -->
      <nav class="desktop-nav">

        <a
          [routerLink]="['/admin-panel', userId]"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{exact:true}">
          Dashboard
        </a>

        <a
          [routerLink]="['/admin-panel', userId, 'menu']"
          routerLinkActive="active">
          My Menu
        </a>

        <a
          [routerLink]="['/admin-panel', userId, 'qr-code']"
          routerLinkActive="active">
          QR Design
        </a>

      </nav>

      <div class="desktop-actions">

        <a class="logout-btn"
           routerLink="/register">
          Logout
        </a>

      </div>

      <!-- Mobile Hamburger -->
      <button
        class="mobile-toggle"
        (click)="menuOpen=!menuOpen">

        <i
          class="fa"
          [ngClass]="menuOpen ? 'fa-times' : 'fa-bars'">
        </i>.

      </button>

    </div>

  </div>

  <!-- Mobile Overlay -->
  <div
    class="mobile-overlay"
    *ngIf="menuOpen"
    (click)="menuOpen=false">
  </div>

  <!-- Mobile Menu -->
  <nav
    class="mobile-nav"
    [class.open]="menuOpen">

    <a
      [routerLink]="['/admin-panel', userId]"
      (click)="menuOpen=false">
      <i class="fa fa-home"></i>
      Dashboard
    </a>

    <a
      [routerLink]="['/admin-panel', userId,'menu']"
      (click)="menuOpen=false">
      <i class="fa fa-cutlery"></i>
      My Menu
    </a>

    <a
      [routerLink]="['/admin-panel', userId,'qr-code']"
      (click)="menuOpen=false">
      <i class="fa fa-qrcode"></i>
      QR Design
    </a>

    <a
      routerLink="/register"
      (click)="menuOpen=false">
      <i class="fa fa-sign-out"></i>
      Logout
    </a>

  </nav>

</header>
